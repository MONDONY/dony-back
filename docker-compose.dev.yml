services:
  db:
    image: postgres:16
    container_name: dony_db
    environment:
      POSTGRES_DB: dony_dev
      POSTGRES_USER: dony
      POSTGRES_PASSWORD: dony_dev_password
    ports:
      - "5432:5432"
    volumes:
      - dony_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dony -d dony_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer
    container_name: dony_adminer
    ports:
      - "8888:8080"
    depends_on:
      - db

  # MinIO — S3-compatible local storage (remplace Cloudflare R2 en dev)
  minio:
    image: minio/minio:latest
    container_name: dony_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: dony
      MINIO_ROOT_PASSWORD: dony_dev_password
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # Console web
    volumes:
      - dony_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Stripe CLI — forwarde les webhooks Stripe vers le backend local
  # Pas besoin de "stripe listen" dans un terminal séparé
  stripe-cli:
    image: stripe/stripe-cli:latest
    container_name: dony_stripe_cli
    command: listen --api-key ${STRIPE_SECRET_KEY} --forward-to http://host.docker.internal:8080/api/v1/kyc/webhook
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  dony_db_data:
  dony_minio_data:
