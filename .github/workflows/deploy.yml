name: CI/CD — Verify, Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 3 * * 1'  # Scan OWASP hebdomadaire — lundi 03:00 UTC

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/mondony/dony-back
  JAVA_VERSION: '21'

# ══════════════════════════════════════════════════════════════════════════
# GATES QUALITÉ (parallèles) — tous doivent passer avant le build
# ══════════════════════════════════════════════════════════════════════════

jobs:

  # ── Gate 1 : Tests unitaires + rapport couverture JaCoCo ──────────────
  test:
    name: ✅ Tests & Couverture
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Tests + rapport JaCoCo
        run: ./mvnw verify -Dspring.profiles.active=test

      - name: Upload rapport couverture
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 7

  # ── Gate 2 : Analyse statique SpotBugs (bugs HIGH bloquent le deploy) ─
  static-analysis:
    name: 🔍 Analyse statique (SpotBugs)
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Compilation
        run: ./mvnw compile -q

      - name: SpotBugs — bugs HIGH = échec
        run: ./mvnw spotbugs:check

      - name: Upload rapport SpotBugs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: spotbugs-report
          path: target/spotbugsXml.xml
          retention-days: 7

  # ── Gate 3 : Scan CVE dépendances (Trivy) ─────────────────────────────
  security-scan:
    name: 🔒 Scan sécurité (Trivy)
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    permissions:
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build JAR pour scan
        run: ./mvnw package -DskipTests -q

      - name: Trivy — CVE CRITICAL/HIGH = échec
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true
          format: table

      - name: Trivy — rapport SARIF (onglet Security GitHub)
        uses: aquasecurity/trivy-action@0.28.0
        if: always()
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: true
          format: sarif
          output: trivy-results.sarif

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # ── Gate 4 : Lint Dockerfile (hadolint) ───────────────────────────────
  docker-lint:
    name: 🐳 Lint Dockerfile
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'

    steps:
      - uses: actions/checkout@v4

      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning

  # ══════════════════════════════════════════════════════════════════════
  # BUILD & PUSH — seulement si les 4 gates passent + push sur main
  # ══════════════════════════════════════════════════════════════════════

  build-push:
    name: 📦 Build & Push image Docker
    runs-on: ubuntu-latest
    needs: [test, static-analysis, security-scan, docker-lint]
    if: >
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build JAR
        run: ./mvnw package -DskipTests -q

      - name: Login ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Métadonnées image (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ══════════════════════════════════════════════════════════════════════
  # DEPLOY — SSH sur VPS OVH + health check + notification Sentry
  # ══════════════════════════════════════════════════════════════════════

  deploy:
    name: 🚀 Déploiement OVH
    runs-on: ubuntu-latest
    needs: build-push
    environment: production

    steps:
      - name: Déploiement via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OVH_HOST }}
          username: ${{ secrets.OVH_USER }}
          key: ${{ secrets.OVH_SSH_KEY }}
          script: |
            cd ~/dony
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f docker-compose.prod.yml pull api
            docker compose -f docker-compose.prod.yml up -d --no-deps api
            docker image prune -f

      - name: Health check (60s max)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OVH_HOST }}
          username: ${{ secrets.OVH_USER }}
          key: ${{ secrets.OVH_SSH_KEY }}
          script: |
            for i in $(seq 1 12); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/v1/actuator/health)
              if [ "$STATUS" = "200" ]; then
                echo "✅ API healthy (tentative $i)"
                exit 0
              fi
              echo "Tentative $i — HTTP $STATUS — 5s..."
              sleep 5
            done
            echo "❌ API non disponible après 60s"
            exit 1

      - name: Notification Sentry
        uses: getsentry/action-release@v3
        if: success()
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        with:
          environment: production

  # ══════════════════════════════════════════════════════════════════════
  # SCAN OWASP — hebdomadaire uniquement (trop lent pour chaque push)
  # ══════════════════════════════════════════════════════════════════════

  owasp-weekly:
    name: 🛡️ OWASP Dependency Check (hebdomadaire)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: OWASP — CVSS ≥ 7 = échec
        run: ./mvnw org.owasp:dependency-check-maven:check -DfailBuildOnCVSS=7

      - name: Upload rapport OWASP
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-report
          path: target/dependency-check-report.html
          retention-days: 30
