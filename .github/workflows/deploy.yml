name: CD — Build & Deploy

# Déclenché UNIQUEMENT quand "CI — Quality Gates" se termine avec succès sur main.
# Ne se lance JAMAIS directement — toujours après la validation qualité.
on:
  workflow_run:
    workflows: ["CI — Quality Gates"]
    types: [completed]
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/mondony/dony-back
  JAVA_VERSION: '21'

jobs:

  # ── Vérifie que les quality gates ont réussi ──────────────────────────
  check-quality:
    name: 🛡️ Vérification quality gates
    runs-on: ubuntu-latest
    outputs:
      passed: ${{ steps.check.outputs.passed }}

    steps:
      - name: Quality gates réussies ?
        id: check
        run: |
          if [ "${{ github.event.workflow_run.conclusion }}" = "success" ]; then
            echo "passed=true" >> $GITHUB_OUTPUT
            echo "✅ Quality gates validées — déploiement autorisé"
          else
            echo "passed=false" >> $GITHUB_OUTPUT
            echo "❌ Quality gates échouées — déploiement bloqué"
            exit 1
          fi

  # ── Build JAR + image Docker + push ghcr.io ───────────────────────────
  build-push:
    name: 📦 Build & Push image Docker
    runs-on: ubuntu-latest
    needs: check-quality
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build JAR
        run: ./mvnw package -DskipTests -q

      - name: Login ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Métadonnées image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short,enable=true
            type=raw,value=latest

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ── Déploiement SSH sur VPS OVH ───────────────────────────────────────
  deploy:
    name: 🚀 Déploiement OVH
    runs-on: ubuntu-latest
    needs: build-push
    environment: production

    steps:
      - name: Déploiement via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OVH_HOST }}
          username: ${{ secrets.OVH_USER }}
          key: ${{ secrets.OVH_SSH_KEY }}
          script: |
            cd ~/dony
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f docker-compose.prod.yml pull api
            docker compose -f docker-compose.prod.yml up -d --no-deps api
            docker image prune -f

      - name: Health check post-déploiement (60s max)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OVH_HOST }}
          username: ${{ secrets.OVH_USER }}
          key: ${{ secrets.OVH_SSH_KEY }}
          script: |
            for i in $(seq 1 12); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/v1/actuator/health)
              if [ "$STATUS" = "200" ]; then
                echo "✅ API healthy (tentative $i)"
                exit 0
              fi
              echo "Tentative $i — HTTP $STATUS — attente 5s..."
              sleep 5
            done
            echo "❌ API non disponible après 60s"
            exit 1

      - name: Notification Sentry
        uses: getsentry/action-release@v3
        if: success()
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        with:
          environment: production
