name: Deploy Staging

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main, "feature/**"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/mondony/dony-back

jobs:

  check-ci:
    name: Vérification CI
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.extract.outputs.branch }}
    steps:
      - name: Extraire la branche
        id: extract
        run: |
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "🔍 Workflow CI sur la branche: $BRANCH"
      - name: La CI a-t-elle réussi ?
        run: |
          if [ "${{ github.event.workflow_run.conclusion }}" != "success" ]; then
            echo "❌ CI échouée — déploiement bloqué"
            exit 1
          fi
          echo "✅ CI validée — déploiement autorisé"

  build-push:
    name: Build & Push image
    runs-on: ubuntu-latest
    needs: check-ci
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - name: Connexion à ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Métadonnées image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short,enable=true
            type=raw,value=staging
      - name: Build & Push vers GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Déploiement Staging
    runs-on: ubuntu-latest
    needs: [check-ci, build-push]
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Valider les secrets critiques
        run: |
          if [ -z "${{ secrets.OVH_HOST }}" ]; then
            echo "❌ Secret manquant: OVH_HOST"
            exit 1
          fi
          if [ -z "${{ secrets.OVH_USER }}" ]; then
            echo "❌ Secret manquant: OVH_USER"
            exit 1
          fi
          if [ -z "${{ secrets.OVH_SSH_KEY }}" ]; then
            echo "❌ Secret manquant: OVH_SSH_KEY"
            exit 1
          fi
          if [ -z "${{ secrets.GHCR_USERNAME }}" ]; then
            echo "❌ Secret manquant: GHCR_USERNAME"
            exit 1
          fi
          if [ -z "${{ secrets.GHCR_PAT }}" ]; then
            echo "❌ Secret manquant: GHCR_PAT"
            exit 1
          fi
          if [ -z "${{ secrets.DB_USERNAME }}" ]; then
            echo "❌ Secret manquant: DB_USERNAME"
            exit 1
          fi
          if [ -z "${{ secrets.DB_PASSWORD }}" ]; then
            echo "❌ Secret manquant: DB_PASSWORD"
            exit 1
          fi
          echo "✅ Tous les secrets critiques sont présents"

      - name: Créer .env.staging depuis les secrets
        run: |
          cat > .env.staging << 'EOF'
          DB_USERNAME=${{ secrets.DB_USERNAME }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}
          STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}
          SENTRY_DSN=${{ secrets.SENTRY_DSN }}
          GOOGLE_PLACES_API_KEY=${{ secrets.GOOGLE_PLACES_API_KEY }}
          AWS_S3_ENDPOINT=${{ secrets.AWS_S3_ENDPOINT }}
          AWS_S3_REGION=${{ secrets.AWS_S3_REGION }}
          AWS_S3_BUCKET=${{ secrets.AWS_S3_BUCKET }}
          AWS_S3_ACCESS_KEY=${{ secrets.AWS_S3_ACCESS_KEY }}
          AWS_S3_SECRET_KEY=${{ secrets.AWS_S3_SECRET_KEY }}
          CORS_ALLOWED_ORIGINS=${{ secrets.CORS_ALLOWED_ORIGINS }}
          GRAFANA_PROM_URL=${{ secrets.GRAFANA_PROM_URL }}
          GRAFANA_PROM_USER=${{ secrets.GRAFANA_PROM_USER }}
          GRAFANA_LOKI_URL=${{ secrets.GRAFANA_LOKI_URL }}
          GRAFANA_LOKI_USER=${{ secrets.GRAFANA_LOKI_USER }}
          GRAFANA_CLOUD_TOKEN=${{ secrets.GRAFANA_CLOUD_TOKEN }}
          RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
          INTERNAL_SHARED_SECRET=${{ secrets.INTERNAL_SHARED_SECRET }}
          EOF
          chmod 600 .env.staging
          echo "✅ Fichier .env.staging créé (600 permissions)"

      - name: Préparer répertoires sur le VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OVH_HOST }}
          username: ${{ secrets.OVH_USER }}
          key: ${{ secrets.OVH_SSH_KEY }}
          script: |
            set -e
            mkdir -p ~/dony
            cd ~/dony
            echo "📁 Création des répertoires..."
            mkdir -p nginx/certs nginx/www backups
            echo "🧹 Réinitialisation du dossier monitoring (config régénérée depuis le repo)..."
            rm -rf monitoring
            echo "✅ Répertoires prêts"

      - name: Transférer compose, config et .env au VPS
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.OVH_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i ~/.ssh/id_ed25519"
          DEST="${{ secrets.OVH_USER }}@${{ secrets.OVH_HOST }}:~/dony"

          echo "📤 docker-compose.staging.yml (source unique)..."
          scp $SSH_OPTS docker-compose.staging.yml "$DEST/"

          echo "📤 .env.staging..."
          scp $SSH_OPTS .env.staging "$DEST/"

          echo "📤 nginx.staging.conf..."
          scp $SSH_OPTS nginx/nginx.staging.conf "$DEST/nginx/"

          echo "📤 monitoring/ (alloy, prometheus, grafana)..."
          scp $SSH_OPTS -r monitoring "$DEST/"

          echo "✅ Tous les fichiers transférés"

      - name: Déploiement Docker Compose
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OVH_HOST }}
          username: ${{ secrets.OVH_USER }}
          key: ${{ secrets.OVH_SSH_KEY }}
          script: |
            set -e
            cd ~/dony

            echo "🔐 Connexion à GHCR..."
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin

            echo "📥 Pull de l'image API..."
            docker compose --env-file .env.staging -f docker-compose.staging.yml pull api

            echo "🚀 Démarrage de TOUS les services (api, db, nginx, monitoring, stripe-cli)..."
            docker compose --env-file .env.staging -f docker-compose.staging.yml up -d --remove-orphans

            echo "🧹 Nettoyage des images inutiles..."
            docker image prune -f

            echo "✅ Déploiement effectué"

      - name: Health check — Base de données (30s)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OVH_HOST }}
          username: ${{ secrets.OVH_USER }}
          key: ${{ secrets.OVH_SSH_KEY }}
          script: |
            set -e
            cd ~/dony

            echo "🔍 Vérification de PostgreSQL..."
            for i in $(seq 1 6); do
              if docker exec dony_db_staging pg_isready -U "${{ secrets.DB_USERNAME }}" -d dony_staging 2>/dev/null | grep -q "accepting"; then
                echo "✅ PostgreSQL healthy (tentative $i)"
                exit 0
              fi
              echo "  ⏳ Tentative $i/6 — attente 5s..."
              sleep 5
            done
            echo "❌ PostgreSQL non disponible après 30s"
            exit 1

      - name: Health check — API (60s)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OVH_HOST }}
          username: ${{ secrets.OVH_USER }}
          key: ${{ secrets.OVH_SSH_KEY }}
          script: |
            set -e
            cd ~/dony

            echo "🔍 Vérification de l'API..."
            for i in $(seq 1 12); do
              # Attendre que le conteneur soit prêt
              if ! docker ps | grep -q dony_api; then
                echo "  ⏳ Tentative $i/12 — conteneur en démarrage..."
                sleep 5
                continue
              fi

              # Vérifier l'endpoint health
              STATUS=$(docker exec dony_api wget -q -O - http://localhost:8080/api/v1/actuator/health 2>/dev/null | grep -o '"status":"[^"]*"' | grep -o '[^"]*"$' | tr -d '"' || echo "UNKNOWN")

              if [ "$STATUS" = "UP" ]; then
                echo "✅ API healthy (tentative $i/12)"
                exit 0
              fi
              echo "  ⏳ Tentative $i/12 — état: $STATUS"
              sleep 5
            done

            echo "❌ API non disponible après 60s"
            echo "📋 Derniers logs:"
            docker logs dony_api | tail -20
            exit 1

      - name: Rapport de déploiement
        if: always()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OVH_HOST }}
          username: ${{ secrets.OVH_USER }}
          key: ${{ secrets.OVH_SSH_KEY }}
          script: |
            set +e
            cd ~/dony

            echo ""
            echo "═════════════════════════════════════════"
            echo "📊 RAPPORT DE DÉPLOIEMENT"
            echo "═════════════════════════════════════════"
            echo ""
            echo "🐳 Conteneurs:"
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" | grep -E "dony_|NAMES"
            echo ""
            echo "📦 Images:"
            docker images | grep dony | head -3
            echo ""
            echo "💾 Volumes:"
            docker volume ls | grep dony
            echo ""
            echo "📝 Logs API (dernières 10 lignes):"
            docker logs dony_api --tail 10
            echo ""
            echo "═════════════════════════════════════════"
