name: Deploy Staging

on:
  workflow_run:
    # COUPLAGE : ce nom doit rester synchronisé avec le champ `name:` de .github/workflows/ci.yml
    # Si le nom du workflow CI change, ce déclencheur cesse de fonctionner silencieusement.
    workflows: ["CI"]
    types: [completed]
    branches: [main, "feature/**"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/mondony/dony-back

jobs:

  check-ci:
    name: Vérification CI
    runs-on: ubuntu-latest
    steps:
      - name: La CI a-t-elle réussi ?
        run: |
          if [ "${{ github.event.workflow_run.conclusion }}" != "success" ]; then
            echo "CI échouée — déploiement bloqué"
            exit 1
          fi
          echo "CI validée — déploiement autorisé"

  build-push:
    name: Build & Push image
    runs-on: ubuntu-latest
    needs: check-ci
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - name: Login ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Métadonnées image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short,enable=true
            type=raw,value=staging
      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Déploiement staging
    runs-on: ubuntu-latest
    needs: build-push
    environment: staging
    steps:
      - name: Créer le fichier .env.staging
        run: |
          cat > .env.staging << 'EOF'
          DB_USERNAME=${{ secrets.DB_USERNAME }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}
          SENTRY_DSN=${{ secrets.SENTRY_DSN }}
          ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}
          GOOGLE_PLACES_API_KEY=${{ secrets.GOOGLE_PLACES_API_KEY }}
          AWS_S3_ENDPOINT=${{ secrets.AWS_S3_ENDPOINT }}
          AWS_S3_REGION=${{ secrets.AWS_S3_REGION }}
          AWS_S3_BUCKET=${{ secrets.AWS_S3_BUCKET }}
          AWS_S3_ACCESS_KEY=${{ secrets.AWS_S3_ACCESS_KEY }}
          AWS_S3_SECRET_KEY=${{ secrets.AWS_S3_SECRET_KEY }}
          CORS_ALLOWED_ORIGINS=${{ secrets.CORS_ALLOWED_ORIGINS }}
          GRAFANA_PROM_URL=${{ secrets.GRAFANA_PROM_URL }}
          GRAFANA_PROM_USER=${{ secrets.GRAFANA_PROM_USER }}
          GRAFANA_LOKI_URL=${{ secrets.GRAFANA_LOKI_URL }}
          GRAFANA_LOKI_USER=${{ secrets.GRAFANA_LOKI_USER }}
          GRAFANA_CLOUD_TOKEN=${{ secrets.GRAFANA_CLOUD_TOKEN }}
          RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
          INTERNAL_SHARED_SECRET=${{ secrets.INTERNAL_SHARED_SECRET }}
          EOF
          echo "✅ Fichier .env.staging créé"
      - name: Transférer .env.staging et fichiers de config
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OVH_HOST }}
          username: ${{ secrets.OVH_USER }}
          key: ${{ secrets.OVH_SSH_KEY }}
          script: |
            cd ~/dony
            # Créer les répertoires nécessaires
            mkdir -p monitoring/alloy nginx/certs nginx/www backups
            # Télécharger les fichiers de config depuis GitHub
            curl -sSL https://raw.githubusercontent.com/MONDONY/dony-back/main/docker-compose.staging.yml -o docker-compose.staging.yml
            curl -sSL https://raw.githubusercontent.com/MONDONY/dony-back/main/monitoring/alloy/config.alloy -o monitoring/alloy/config.alloy
            curl -sSL https://raw.githubusercontent.com/MONDONY/dony-back/main/nginx/nginx.staging.conf -o nginx/nginx.staging.conf
            echo "✅ Fichiers de config téléchargés"
      - name: Transférer .env.staging via SCP
        uses: appleboy/scp-action@v0
        with:
          host: ${{ secrets.OVH_HOST }}
          username: ${{ secrets.OVH_USER }}
          key: ${{ secrets.OVH_SSH_KEY }}
          source: ".env.staging"
          target: "dony/"
      - name: Déploiement via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OVH_HOST }}
          username: ${{ secrets.OVH_USER }}
          key: ${{ secrets.OVH_SSH_KEY }}
          script: |
            cd ~/dony
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            docker compose -f docker-compose.staging.yml pull api
            docker compose -f docker-compose.staging.yml up -d --no-deps api
            docker image prune -f
      - name: Health check post-déploiement (60s max)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OVH_HOST }}
          username: ${{ secrets.OVH_USER }}
          key: ${{ secrets.OVH_SSH_KEY }}
          script: |
            for i in $(seq 1 12); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/v1/actuator/health)
              if [ "$STATUS" = "200" ]; then
                echo "API staging healthy (tentative $i)"
                exit 0
              fi
              echo "Tentative $i — HTTP $STATUS — attente 5s..."
              sleep 5
            done
            echo "API staging non disponible après 60s"
            exit 1
