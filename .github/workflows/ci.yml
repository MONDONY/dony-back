name: CI

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

env:
  JAVA_VERSION: '21'

permissions:
  contents: read
  security-events: write
  actions: read

jobs:

  test:
    name: Tests & Couverture
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
      - name: Tests unitaires (gate bloquant)
        run: |
          chmod +x mvnw
          ./mvnw test -Dspring.profiles.active=test --no-transfer-progress
      - name: Rapport JaCoCo + gate couverture (bloquant — seuil configuré dans pom.xml)
        run: ./mvnw verify -Dspring.profiles.active=test --no-transfer-progress
      - name: Upload rapport couverture
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 7

  static-analysis:
    name: SpotBugs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
      - name: Compilation complète (sources + tests)
        run: |
          chmod +x mvnw
          ./mvnw test-compile --no-transfer-progress
      - name: SpotBugs — bugs HIGH = échec
        run: ./mvnw spotbugs:check --no-transfer-progress
      - name: Upload rapport SpotBugs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: spotbugs-report
          path: target/spotbugsXml.xml
          retention-days: 7

  security-scan:
    name: Trivy CVE Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy — CVE CRITICAL = échec
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          trivyignores: .trivyignore
          format: table
          skip-dirs: target,docs,.github,.mvn

  docker-lint:
    name: Hadolint Dockerfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning
