name: CI — Quality Gates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  JAVA_VERSION: '21'

jobs:

  # ── Gate 1 : Tests unitaires + rapport couverture JaCoCo ──────────────
  test:
    name: ✅ Tests & Couverture
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Tests + rapport JaCoCo
        # 'verify' déclencherait SpotBugs — on sépare les deux phases
        run: ./mvnw test jacoco:report -Dspring.profiles.active=test --no-transfer-progress

      - name: Upload rapport couverture
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 7

  # ── Gate 2 : Analyse statique SpotBugs ────────────────────────────────
  static-analysis:
    name: 🔍 SpotBugs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Compilation
        run: ./mvnw compile -q

      - name: SpotBugs — bugs HIGH = échec
        run: ./mvnw spotbugs:check

      - name: Upload rapport SpotBugs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: spotbugs-report
          path: target/spotbugsXml.xml
          retention-days: 7

  # ── Gate 3 : Scan CVE dépendances (Trivy) ─────────────────────────────
  security-scan:
    name: 🔒 Trivy CVE Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Trivy — CVE CRITICAL/HIGH = échec
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true
          format: table
          skip-dirs: target,docs,.github,.mvn

      - name: Trivy — rapport SARIF (onglet Security GitHub)
        uses: aquasecurity/trivy-action@0.28.0
        if: always()
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: true
          format: sarif
          output: trivy-results.sarif
          skip-dirs: target,docs,.github,.mvn

      - name: Upload SARIF vers GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # ── Gate 4 : Lint Dockerfile ──────────────────────────────────────────
  docker-lint:
    name: 🐳 Hadolint Dockerfile
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning
