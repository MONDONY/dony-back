services:
  api:
    image: ghcr.io/mondony/dony-back:${DONY_IMAGE_TAG:-latest}
    container_name: dony_api
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      SENTRY_DSN: ${SENTRY_DSN}
      HETZNER_S3_ENDPOINT: ${HETZNER_S3_ENDPOINT}
      HETZNER_S3_REGION: ${HETZNER_S3_REGION}
      HETZNER_S3_BUCKET: ${HETZNER_S3_BUCKET}
      HETZNER_S3_ACCESS_KEY: ${HETZNER_S3_ACCESS_KEY}
      HETZNER_S3_SECRET_KEY: ${HETZNER_S3_SECRET_KEY}
    volumes:
      - ./firebase-service-account.json:/app/firebase-service-account.json:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dony_internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/v1/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  alloy:
    image: grafana/alloy:v1.8.3
    container_name: dony_alloy
    restart: unless-stopped
    command:
      - run
      - /etc/alloy/config.alloy
      - --storage.path=/var/lib/alloy/data
    environment:
      DONY_ENV: prod
      GRAFANA_PROM_URL: ${GRAFANA_PROM_URL}
      GRAFANA_PROM_USER: ${GRAFANA_PROM_USER}
      GRAFANA_LOKI_URL: ${GRAFANA_LOKI_URL}
      GRAFANA_LOKI_USER: ${GRAFANA_LOKI_USER}
      GRAFANA_CLOUD_TOKEN: ${GRAFANA_CLOUD_TOKEN}
    volumes:
      - ./monitoring/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - dony_alloy_data:/var/lib/alloy/data
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/root:ro,rslave
    networks:
      - dony_internal
    depends_on:
      - api

  db:
    image: postgres:16-alpine
    container_name: dony_db_prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: dony_prod
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - dony_db_prod_data:/var/lib/postgresql/data
    # Aucun port exposé — accessible uniquement via le réseau interne Docker
    networks:
      - dony_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d dony_prod"]
      interval: 10s
      timeout: 5s
      retries: 10

  db-backup:
    image: postgres:16-alpine
    container_name: dony_db_backup
    restart: unless-stopped
    environment:
      PGPASSWORD: ${DB_PASSWORD}
    volumes:
      - ./backups:/backups
    networks:
      - dony_internal
    # Backup immédiat au démarrage, puis toutes les 24h. Keep last 7 days.
    entrypoint: >
      sh -c "
        backup() {
          FILE=/backups/backup_$$(date +%Y%m%d_%H%M%S).sql.gz;
          pg_dump -h db -U ${DB_USERNAME} dony_prod | gzip > $$FILE;
          echo \"Backup created: $$FILE\";
          find /backups -name 'backup_*.sql.gz' -mtime +7 -delete;
        };
        backup;
        while true; do sleep 86400 & wait $$!; backup; done
      "
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    container_name: dony_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/letsencrypt:ro
      - ./nginx/www:/var/www/certbot:ro
    depends_on:
      - api
    networks:
      - dony_internal

volumes:
  dony_db_prod_data:
  dony_alloy_data:

networks:
  dony_internal:
    driver: bridge
