name: dony
description: "P2P marketplace connecting travelers and senders for package delivery to Africa."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  firebase_messaging: ^15.0.0

  # Payments
  flutter_stripe: ^11.0.0

  # QR & Biometrics
  mobile_scanner: ^5.0.0
  local_auth: ^2.3.0

  # Location
  geolocator: ^13.0.0

  # Media
  image_picker: ^1.1.0

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Networking
  dio: ^5.7.0
  connectivity_plus: ^6.0.0

  # State management
  flutter_bloc: ^8.1.6

  # Navigation
  go_router: ^14.0.0

  # Monitoring
  sentry_flutter: ^8.0.0

  # DI
  get_it: ^8.0.0

  # Utils
  intl: ^0.19.0
  equatable: ^2.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
