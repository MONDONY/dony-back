worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout 65;
    server_tokens   off;

    # ── Rate limiting zones ──────────────────────────────────────────────────
    # General API: 30 req/min per IP
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/m;
    # Auth and KYC: 5 req/min per IP
    limit_req_zone $binary_remote_addr zone=api_sensitive:10m rate=5r/m;

    # ── HTTP → HTTPS redirect ────────────────────────────────────────────────
    server {
        listen 80;
        server_name api.dony.app;

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS main server ────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2  on;
        server_name api.dony.app;

        ssl_certificate     /etc/letsencrypt/live/api.dony.app/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.dony.app/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        # Security headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy no-referrer always;

        client_max_body_size 15M;

        # Docker internal DNS resolver — defers upstream resolution so nginx -t passes
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $backend http://api:8080;

        # ── Sensitive endpoints: 5 req/min ───────────────────────────────────
        location ~ ^/api/v1/(auth|kyc) {
            limit_req zone=api_sensitive burst=3 nodelay;
            limit_req_status 429;

            proxy_pass         $backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ── General API: 30 req/min ──────────────────────────────────────────
        location /api/v1/ {
            limit_req zone=api_general burst=10 nodelay;
            limit_req_status 429;

            proxy_pass         $backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ── Health check (no rate limit) ─────────────────────────────────────
        location /api/v1/actuator/health {
            proxy_pass $backend;
            proxy_set_header Host $host;
        }

        # Actuator : seul /health est public, le reste est bloqué
        location /api/v1/actuator/ {
            return 404;
        }

        # Block everything else
        location / {
            return 404;
        }
    }
}
