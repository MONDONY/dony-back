services:
  db:
    image: postgres:16
    container_name: dony_db
    environment:
      POSTGRES_DB: dony_dev
      POSTGRES_USER: dony
      POSTGRES_PASSWORD: dony_dev_password
    ports:
      - "5432:5432"
    volumes:
      - dony_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dony -d dony_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer
    container_name: dony_adminer
    ports:
      - "8888:8080"
    depends_on:
      - db

volumes:
  dony_db_data:
