global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    env: staging
    instance: dony-staging

scrape_configs:
  # Scraper l'API Spring Boot Actuator
  - job_name: 'dony-api'
    static_configs:
      - targets: ['api:8080']
    metrics_path: '/api/v1/actuator/prometheus'
    scrape_interval: 30s

  # Scraper les métriques du système hôte (collectées par Alloy)
  - job_name: 'host'
    static_configs:
      - targets: ['localhost:9100']
    scrape_interval: 30s
