global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    env: staging
    instance: dony-staging

scrape_configs:
  # Scraper l'API Spring Boot Actuator (pull direct)
  - job_name: 'dony-api'
    static_configs:
      - targets: ['api:8080']
    metrics_path: '/api/v1/actuator/prometheus'
    scrape_interval: 30s

# Les métriques de l'hôte (node_*) arrivent via remote_write d'Alloy
# (voir monitoring/alloy/config.alloy + flag --web.enable-remote-write-receiver)
