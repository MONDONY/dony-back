# Enable Swagger UI only in dev
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/dony_dev
    username: dony
    password: ${POSTGRES_PASSWORD:dony_dev_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    show-sql: true

# Sentry disabled in dev
sentry:
  dsn: ""
  enabled: false

# Cloudflare R2 (S3-compatible)
aws:
  s3:
    region: ${AWS_S3_REGION}
    bucket: ${AWS_S3_BUCKET}
    access-key: ${AWS_S3_ACCESS_KEY}
    secret-key: ${AWS_S3_SECRET_KEY}
    endpoint: ${AWS_S3_ENDPOINT:}

# Stripe (test keys — définir STRIPE_SECRET_KEY et STRIPE_WEBHOOK_SECRET dans les variables d'env)
stripe:
  secret-key: ${STRIPE_SECRET_KEY:sk_test_placeholder}
  # Kept for backwards compatibility with existing Stripe CLI local testing scripts
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_local}
  webhook:
    payments-secret: ${STRIPE_WEBHOOK_PAYMENTS_SECRET:${STRIPE_WEBHOOK_SECRET:whsec_local}}
    kyc-secret: ${STRIPE_WEBHOOK_KYC_SECRET:${STRIPE_WEBHOOK_SECRET:whsec_local}}

# Firebase
firebase:
  service-account-path: classpath:firebase-service-account.json
  # Web API Key — requis pour GET /dev/token (Firebase Console > Paramètres du projet > Général > Clé d'API Web)
  web-api-key: ${FIREBASE_API_KEY:}

dony:
  email:
    resend-api-key: re_XUDoz7om_PorRcS2T5oic4LuvhCQBWGzy
    from-address: noreply@yadony.com
    otp-template: "Ton code dony est : %s. Valable 10 minutes."
  kyc:
    enforce: false
    return-url: "https://dony.app/kyc/complete"
  stripe:
    enforce: false
    connect:
      mcc: "4215"
      product-description: "Transport de colis entre particuliers via la plateforme Dony"
      business-url: "https://dony.app"
      # Stripe n'accepte pas les deep links (dony://) — on passe par des endpoints HTTP intermédiaires
      # Émulateur Android : 10.0.2.2 = localhost machine. Appareil physique : remplacer par l'IP locale
      return-url: "http://10.0.2.2:8080/api/v1/payments/onboarding/return"
      refresh-url: "http://10.0.2.2:8080/api/v1/payments/onboarding/refresh"
      deep-link-return: "dony://stripe/onboarding/complete"
      deep-link-refresh: "dony://stripe/onboarding/refresh"
  internal:
    secret: ${INTERNAL_SHARED_SECRET:local-dev-secret-change-me}
  commission:
    rate: 0.12

logging:
  level:
    com.dony.api: DEBUG
    org.springframework.security: DEBUG

app:
  places:
    api-key: ${GOOGLE_PLACES_API_KEY}
    allowed-countries: ""
    rate-limit-per-minute: 200
    daily-quota-autocomplete: 10000
    daily-quota-details: 2000
    daily-quota-reverse: 1000
    block-when-quota-exceeded: false
