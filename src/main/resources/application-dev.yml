spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/dony_dev
    username: dony
    password: dony_dev_password
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    show-sql: true

# Sentry disabled in dev
sentry:
  dsn: ""
  enabled: false

# Cloudflare R2 (S3-compatible)
aws:
  s3:
    region: ${AWS_S3_REGION}
    bucket: ${AWS_S3_BUCKET}
    access-key: ${AWS_S3_ACCESS_KEY}
    secret-key: ${AWS_S3_SECRET_KEY}
    endpoint: ${AWS_S3_ENDPOINT:}

# Stripe (test keys — définir STRIPE_SECRET_KEY et STRIPE_WEBHOOK_SECRET dans les variables d'env)
stripe:
  secret-key: ${STRIPE_SECRET_KEY}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET}

# Firebase
firebase:
  service-account-path: classpath:firebase-service-account.json

dony:
  internal:
    secret: local-dev-secret

logging:
  level:
    com.dony.api: DEBUG
    org.springframework.security: DEBUG

app:
  places:
    api-key: ${GOOGLE_PLACES_API_KEY}
    allowed-countries: ""
    rate-limit-per-minute: 200
    daily-quota-autocomplete: 10000
    daily-quota-details: 2000
    daily-quota-reverse: 1000
    block-when-quota-exceeded: false
