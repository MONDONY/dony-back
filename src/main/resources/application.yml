spring:
  application:
    name: dony-back
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # JPA / Hibernate
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC

  # Flyway
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  # Jackson — camelCase + ISO 8601 UTC
  jackson:
    property-naming-strategy: LOWER_CAMEL_CASE
    serialization:
      write-dates-as-timestamps: false
      write-date-timestamps-as-nanoseconds: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: NON_NULL
    time-zone: UTC

  # Security
  security:
    user:
      name: disabled
      password: disabled

  # Multipart upload (Spring's defaults are 1 MB / 10 MB which truncate
  # photos coming from mobile cameras — bumped to match StorageService.MAX_FILE_SIZE)
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

# Server
server:
  servlet:
    context-path: /api/v1
  port: 8080
  error:
    whitelabel:
      enabled: false
  # Tomcat enforces its own multipart limits before Spring sees the request.
  # Default 2 MB rejects mobile photos silently — bumped to match StorageService.
  tomcat:
    max-http-form-post-size: 12MB
    max-swallow-size: 12MB

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
    prometheus:
      # Spring Boot 3.5+: use `access` only — `enabled` is mutually exclusive.
      # Prometheus is scraped by the internal monitoring stack.
      # NOT in SecurityConfig permitAll — scraper must authenticate or be
      # isolated at the network level (Nginx/firewall).
      access: read-only
  prometheus:
    metrics:
      export:
        enabled: true
  server:
    port: 8080

# OpenAPI / Swagger — disabled by default, enabled only in dev profile
springdoc:
  api-docs:
    enabled: ${SWAGGER_ENABLED:false}
    path: /v3/api-docs
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:false}
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
    try-it-out-enabled: true
    display-request-duration: true
  packages-to-scan: com.dony.api

# Logging
logging:
  level:
    com.dony.api: INFO
    org.springframework.security: WARN
    org.flywaydb: INFO

# Dony business config
dony:
  commission:
    rate: 0.12
    minimum-amount: 1.00
    no-show-contestation-hours: 24
  cash-commission:
    orphan-pi-cleanup-cron: "0 */15 * * * *"
    orphan-pi-timeout-minutes: 30
    no-show-timeout-cron: "0 0 * * * *"
    card-expiration-warning-days: 30
  cancellation:
    return-deadline-cron: "0 0 * * * *"
  limits:
    non-pro:
      monthly-announcements: 2
  content-categories:
    - Vêtements
    - Médicaments
    - Alimentation sèche
    - "Téléphones & hi-fi"
    - Documents
    - Cosmétiques
    - Chaussures
    - Matériel informatique
    - Autres
  escrow-timeout-hours: 48
  dispute-sla-hours: 72
  max-declared-value-eur: 500
  kyc:
    return-url: "https://dony.store/kyc/complete"
  stripe:
    connect:
      mcc: "4215"
      product-description: "Transport de colis entre particuliers via la plateforme Dony"
      business-url: "https://yadony.com"
      return-url: "dony://stripe/onboarding/complete"
      refresh-url: "dony://stripe/onboarding/refresh"
    webhook:
      poll-interval: 10s
      batch-size: 50
      max-retries: 8
      retry-backoff-base: 30s
      scheduler-enabled: true
  referral:
    reward-amount-cents: 500
    max-invitations-per-user: 50
    code-regeneration-cooldown-days: 30
  requests:
    max-negotiation-rounds: 5
    thread-inactivity-hours: 72
    awaiting-trip-hours: 24
    awaiting-payment-hours: 24
    date-tolerance-default-days: 2
    date-tolerance-max-days: 7
    weight-kg-min: 0.5
    weight-kg-max: 32
    declared-value-max-eur: 500
    body-max-chars: 280
    max-open-requests-per-sender: 10
    max-open-threads-per-traveler: 5
    threads-per-minute-rate-limit: 1
    auto-expire-check-cron: "0 */15 * * * *"
    estimation-corridor-recent-trips: 20
    estimation-cache-ttl-minutes: 60
  mobilemoney:
    wave:
      api-key: ${WAVE_API_KEY:}
      api-url: ${WAVE_API_URL:https://api.wave.com/v1}
      webhook-secret: ${WAVE_WEBHOOK_SECRET:}
    orange-money:
      api-key: ${ORANGE_MONEY_API_KEY:}
      api-url: ${ORANGE_MONEY_API_URL:https://api.orange.com/orange-money-webpay/v1}
      webhook-secret: ${ORANGE_MONEY_WEBHOOK_SECRET:}
    link-expiry-minutes: 30
  email:
    resend-api-key: ${RESEND_API_KEY:}
    from-address: noreply@dony.store
    otp-template: "Ton code dony est : %s. Valable 10 minutes."

# Encryption (AES-256 for KYC sensitive data)
app:
  encryption:
    key: ${ENCRYPTION_KEY:?ENCRYPTION_KEY is required (32-byte base64 or strong passphrase)}
  base-url: ${APP_BASE_URL:http://localhost:8080}
  sms:
    enabled: ${SMS_ENABLED:false}
    africastalking:
      api-key: ${AT_API_KEY:}
      username: ${AT_USERNAME:sandbox}
    twilio:
      account-sid: ${TWILIO_ACCOUNT_SID:}
      auth-token: ${TWILIO_AUTH_TOKEN:}
      from: ${TWILIO_FROM:}
  places:
    api-key: ${GOOGLE_PLACES_API_KEY}
    allowed-countries: FR,SN,CI,ML,CM,GN,BF,TG,BJ,NE,MR,CD,CG,GA,TD,MA,DZ,TN,MG,RE,MU,GP,MQ
    rate-limit-per-minute: 100
    daily-quota-autocomplete: 5000
    daily-quota-details: 1000
    daily-quota-reverse: 500
    block-when-quota-exceeded: true

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}

stripe:
  secret-key: ${STRIPE_SECRET_KEY}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
  webhook:
    payments-secret: ${STRIPE_WEBHOOK_PAYMENTS_SECRET:${STRIPE_WEBHOOK_SECRET:}}
    kyc-secret: ${STRIPE_WEBHOOK_KYC_SECRET:${STRIPE_WEBHOOK_SECRET:}}

storage:
  public-base-url: ${STORAGE_PUBLIC_BASE_URL:https://dony-storage.local}
