spring:
  application:
    name: dony-back
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # JPA / Hibernate
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC

  # Flyway
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  # Jackson — camelCase + ISO 8601 UTC
  jackson:
    property-naming-strategy: LOWER_CAMEL_CASE
    serialization:
      write-dates-as-timestamps: false
      write-date-timestamps-as-nanoseconds: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: NON_NULL
    time-zone: UTC

  # Security
  security:
    user:
      name: disabled
      password: disabled

# Server
server:
  servlet:
    context-path: /api/v1
  port: 8080
  error:
    whitelabel:
      enabled: false

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
  server:
    port: 8080

# Logging
logging:
  level:
    com.dony.api: INFO
    org.springframework.security: WARN
    org.flywaydb: INFO

# Dony business config
dony:
  commission-rate: 0.12
  escrow-timeout-hours: 48
  dispute-sla-hours: 72
  max-declared-value-eur: 500

# Encryption (AES-256 for KYC sensitive data)
app:
  encryption:
    key: ${ENCRYPTION_KEY:dony-dev-encryption-key-change-in-prod}
