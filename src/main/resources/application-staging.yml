# Staging profile — copie durcie de prod avec logs verbeux pour diagnostic
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

server:
  forward-headers-strategy: framework

logging:
  level:
    com.dony.api: DEBUG
    org.springframework.security: INFO

spring:
  datasource:
    url: jdbc:postgresql://dony_db_staging:5432/dony_staging
    username: dony
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

# Stripe Connect : Stripe exige des URLs HTTPS pour return/refresh.
# Le défaut de application.yml (dony://) est un deep link invalide côté Stripe.
# Ces endpoints backend (StripeOnboardingRedirectController) redirigent en 302
# vers le deep link dony:// pour revenir dans l'app.
dony:
  stripe:
    connect:
      return-url: "https://api-staging.dony.store/api/v1/payments/onboarding/return"
      refresh-url: "https://api-staging.dony.store/api/v1/payments/onboarding/refresh"
