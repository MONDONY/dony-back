spring:
  main:
    # Lets E2EMockConfig override infrastructure beans (e.g. placesRestTemplate)
    # with stubbed versions so external-API code (Google Places) is exercised in E2E.
    allow-bean-definition-overriding: true
  datasource:
    url: jdbc:postgresql://localhost/placeholder   # overridden by @DynamicPropertySource (Testcontainers)
    username: placeholder
    password: placeholder
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

sentry:
  dsn: ""
  enabled: false

firebase:
  service-account-path: ""

hetzner:
  s3:
    endpoint: http://localhost:9000
    region: eu-central
    bucket: dony-test
    access-key: test
    secret-key: test

aws:
  s3:
    endpoint: http://localhost:9000
    region: eu-central
    bucket: dony-test
    access-key: test
    secret-key: test

stripe:
  secret-key: sk_test_dummy
  webhook-secret: whsec_dummy

app:
  encryption:
    key: dony-e2e-encryption-key-not-for-production-use-32-bytes
  places:
    api-key: test-places-key
    allowed-countries: SN,CI,ML,CM
    rate-limit-per-minute: 100000
    daily-quota-autocomplete: 100000
    daily-quota-details: 100000
    daily-quota-reverse: 100000
    block-when-quota-exceeded: false

dony:
  # E2E tests run with header-based auth and no real KYC/Stripe onboarding, so the
  # enforcement gates must be off (same as application-test.yml) — otherwise every
  # announcement/bid creation is blocked with 422. NEVER false in prod.
  kyc:
    enforce: false
  stripe:
    enforce: false
    return-url: https://dony.app/payments/onboarding/return
    refresh-url: https://dony.app/payments/onboarding/refresh
  commission:
    rate: 0.12
