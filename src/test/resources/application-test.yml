spring:
  datasource:
    url: jdbc:h2:mem:dony_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;INIT=CREATE SCHEMA IF NOT EXISTS kyc_schema
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false

  flyway:
    enabled: false

sentry:
  dsn: ""
  enabled: false

firebase:
  service-account-path: ""

hetzner:
  s3:
    endpoint: http://localhost:9000
    region: eu-central
    bucket: dony-test
    access-key: test
    secret-key: test

aws:
  s3:
    endpoint: http://localhost:9000
    region: eu-central
    bucket: dony-test
    access-key: test
    secret-key: test

stripe:
  secret-key: sk_test_dummy
  webhook-secret: whsec_dummy

dony:
  kyc:
    enforce: false
  stripe:
    enforce: false
  commission:
    rate: 0.12
    minimum-amount: 1.00
    no-show-contestation-hours: 24
  cash-commission:
    orphan-pi-cleanup-cron: "0 */15 * * * *"
    orphan-pi-timeout-minutes: 30
    no-show-timeout-cron: "0 0 * * * *"
    card-expiration-warning-days: 30
  limits:
    non-pro:
      monthly-announcements: 2
  referral:
    reward-amount-cents: 500
    max-invitations-per-user: 50
    code-regeneration-cooldown-days: 30
  requests:
    max-negotiation-rounds: 3
    thread-inactivity-hours: 1
    auto-expire-check-cron: "-"

app:
  encryption:
    key: dony-test-encryption-key-not-for-production-use-32-bytes
  places:
    api-key: test-api-key
    allowed-countries: ""
    rate-limit-per-minute: 100
    daily-quota-autocomplete: 999999
    daily-quota-details: 999999
    daily-quota-reverse: 999999
    block-when-quota-exceeded: true
