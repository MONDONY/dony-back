spring:
  datasource:
    url: jdbc:h2:mem:dony_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;INIT=CREATE SCHEMA IF NOT EXISTS kyc_schema
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      # `create` (et pas `create-drop`) : avec une H2 in-memory PARTAGÉE
      # (DB_CLOSE_DELAY=-1) et plusieurs contextes @SpringBootTest, le drop au
      # shutdown d'un contexte évincé vidait la DB pour les contextes suivants
      # (ex. addressbook IT → « table not found »). `create` recrée le schéma à
      # chaque démarrage de contexte sans le dropper. L'isolation data reste
      # assurée par les cleanDb()/deleteAll() de chaque test.
      ddl-auto: create
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false

  flyway:
    enabled: false

sentry:
  dsn: ""
  enabled: false

firebase:
  service-account-path: ""

hetzner:
  s3:
    endpoint: http://localhost:9000
    region: eu-central
    bucket: dony-test
    access-key: test
    secret-key: test

aws:
  s3:
    endpoint: http://localhost:9000
    region: eu-central
    bucket: dony-test
    access-key: test
    secret-key: test

